name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true
        default: '0.1.0'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-13          # Intel Mac
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Linux dependencies for Tauri
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: apps/runtime
        run: npm install

      # Build the Tauri app
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple code signing (optional — add secrets if you have an Apple Dev account)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/runtime
          tagName: v__VERSION__
          releaseName: 'AgentPak v__VERSION__'
          releaseBody: |
            AgentPak runtime v__VERSION__

            **Downloads:**
            - macOS (Apple Silicon): `.dmg` file for M1/M2/M3/M4 Macs
            - macOS (Intel): `.dmg` file for Intel Macs
            - Windows: `.msi` installer
            - Linux: `.deb` package and `.AppImage`

            **First time?**
            1. Download the installer for your platform
            2. Install and open AgentPak
            3. Go to Settings → add your API key (Anthropic or OpenAI)
            4. Browse the marketplace or install `.agent` files

            **macOS unsigned warning:** If macOS blocks the app, right-click → Open → Open again.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      # Upload artifacts (in case the release action doesn't work)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentpak-${{ matrix.label }}
          path: |
            apps/runtime/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            apps/runtime/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            apps/runtime/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            apps/runtime/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            apps/runtime/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            apps/runtime/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          if-no-files-found: warn
